<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#080808" />
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C5B8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#E2A9A9" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE5B4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#CBA590" stop-opacity="0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <!-- Deep Obsidian Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <!-- Soft Volumetric Glowing Orbs (Sandal Pink & Peach) -->
  <circle cx="250" cy="350" r="250" fill="url(#glow1)" filter="url(#blur)" />
  <circle cx="650" cy="800" r="300" fill="url(#glow2)" filter="url(#blur)" />
  
  <!-- Network / Architectural Lines (Minimalist & Flowing) -->
  <g stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" fill="none">
    <path d="M 150 250 C 350 450, 550 250, 700 450" />
    <path d="M 250 850 C 450 650, 550 850, 750 550" />
    <path d="M 100 550 C 350 550, 450 350, 650 250" />
    <path d="M 350 150 C 450 450, 350 650, 550 950" />
    <path d="M 200 700 C 400 400, 600 600, 800 300" />
  </g>

  <!-- Data Nodes / AI Connections -->
  <g fill="#FFE5B4" opacity="0.9">
    <circle cx="150" cy="250" r="4" />
    <circle cx="350" cy="450" r="3" />
    <circle cx="550" cy="250" r="5" />
    <circle cx="700" cy="450" r="4" />
    <circle cx="250" cy="850" r="5" />
    <circle cx="450" cy="650" r="3" />
    <circle cx="550" cy="850" r="4" />
    <circle cx="750" cy="550" r="6" />
    <circle cx="100" cy="550" r="4" />
    <circle cx="350" cy="550" r="3" />
    <circle cx="450" cy="350" r="5" />
    <circle cx="650" cy="250" r="4" />
    <circle cx="350" cy="150" r="5" />
    <circle cx="350" cy="650" r="4" />
    <circle cx="550" cy="950" r="5" />
    <circle cx="200" cy="700" r="4" />
    <circle cx="400" cy="400" r="5" />
    <circle cx="600" cy="600" r="3" />
    <circle cx="800" cy="300" r="5" />
  </g>
  
  <!-- Transparent Abstract Geometric Shards -->
  <polygon points="450,350 550,250 650,250" fill="rgba(232, 197, 184, 0.05)" stroke="rgba(232, 197, 184, 0.2)" stroke-width="1" />
  <polygon points="350,450 450,650 350,650" fill="rgba(255, 229, 180, 0.05)" stroke="rgba(255, 229, 180, 0.2)" stroke-width="1" />
  <polygon points="550,850 750,550 700,450" fill="rgba(226, 169, 169, 0.05)" stroke="rgba(226, 169, 169, 0.2)" stroke-width="1" />
  <polygon points="200,700 350,550 400,400" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
</svg>
