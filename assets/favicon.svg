<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Premium Brand Gradient -->
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C5B8" />
      <stop offset="50%" stop-color="#FFE5B4" />
      <stop offset="100%" stop-color="#D49A89" />
    </linearGradient>
    
    <!-- Architectural Drop Shadow for Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Deep Obsidian Background -->
  <rect width="512" height="512" rx="120" fill="#0A0A0A" />

  <!-- The Apex Monogram (Strict Mathematical Precision) -->
  <g transform="translate(151, 110)" fill="url(#gold)" filter="url(#shadow)">
    <!-- Vertical Pillar -->
    <rect x="0" y="0" width="36" height="292" />
    
    <!-- Origami Loop -->
    <path d="M 48 0 H 170 L 210 70 L 170 140 H 48 V 104 H 155 L 174 70 L 155 36 H 48 Z" />

    <!-- Angled Leg -->
    <path d="M 94 152 L 174 292 H 210 L 130 152 Z" />
  </g>
</svg>
